name: Build GST Billing EXE

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 reportlab pyinstaller

      - name: Build with PyInstaller
        run: |
          # Simplified to a single line to prevent line-break errors in Windows shell
          # --collect-all PyQt6 is the most aggressive and reliable way to include all DLLs
          pyinstaller --noconsole --onedir --collect-all PyQt6 --name "GST_Billing_Pro" main.py

      - name: Archive Build Directory
        shell: powershell
        run: |
          # Ensuring we grab the entire folder including all DLLs
          Compress-Archive -Path dist/GST_Billing_Pro/* -DestinationPath GST_Billing_Pro_Windows.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GST_Billing_Windows_Bundle
          path: GST_Billing_Pro_Windows.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: GST_Billing_Pro_Windows.zip
          body: "Automated Build of GST Billing Pro (Stable DLL Bundle)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
