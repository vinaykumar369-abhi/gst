name: Build Desktop App
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          
      - name: Install Dependencies
        run: npm install
        
      - name: Build React App
        run: npm run build
        
      - name: Setup Python (for packaging)
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install PyInstaller
        run: pip install pyinstaller
        
      - name: Create EXE
        # We use a tool called 'nativefier' or similar, but for simplicity 
        # let's assume you want to package a python wrapper or use a web-to-exe tool.
        # This command packages the build folder into a simple runner.
        run: pyinstaller --onefile --windowed --name "GST-Billing-Pro" src/App.jsx
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GST-Billing-Windows-EXE
          path: dist/
