name: Build GST Billing EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 reportlab pyinstaller PyQt6-Qt6

      - name: Build with PyInstaller
        # Added --collect-all for maximum robustness with DLLs
        run: pyinstaller --noconsole --onedir --collect-all PyQt6 --name "GST_Billing_Lite" main.py

      - name: Archive Build
        shell: powershell
        run: |
          if (Test-Path dist/GST_Billing_Lite) {
            Compress-Archive -Path dist/GST_Billing_Lite -DestinationPath GST_Billing_Simple_Windows.zip -Force
          } else {
            exit 1
          }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GST_Billing_App
          path: GST_Billing_Simple_Windows.zip
