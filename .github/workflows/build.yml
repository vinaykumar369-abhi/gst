name: Build Desktop App
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Updated to avoid the deprecation warning in your screenshot
          
      - name: Install Dependencies
        run: npm install
        
      - name: Build React App
        run: npm run build
        
      - name: Create Windows Executable
        # We use 'npx nativefier' to wrap your built React app into a Windows EXE
        # This is much more reliable than using PyInstaller for JavaScript code
        run: |
          npx nativefier --name "GST-Billing-Pro" --platform "windows" "build/"
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GST-Billing-Windows-EXE
          # Nativefier creates a folder with the EXE inside
          path: ./*-win32-x64/
