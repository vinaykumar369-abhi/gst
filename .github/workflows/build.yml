name: Build Executables
on: [push] # Runs every time you push code to GitHub

jobs:
  build:
    strategy:
      matrix:
        # This tells GitHub to run on both Windows and Mac virtual machines
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          # Add other dependencies here, e.g., pip install requests

      - name: Build with PyInstaller
        run: pyinstaller --onefile --windowed your_script.py

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: executable-${{ matrix.os }}
          path: dist/
