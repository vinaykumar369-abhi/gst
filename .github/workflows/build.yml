name: Build GST Billing Multi-Platform

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # --- WINDOWS BUILD ---
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 reportlab pyinstaller PyQt6-Qt6

      - name: Build with PyInstaller
        run: pyinstaller --noconsole --onedir --collect-all PyQt6 --name "GST_Billing_Lite" main.py

      - name: Archive Build
        shell: powershell
        run: |
          if (Test-Path dist/GST_Billing_Lite) {
            Compress-Archive -Path dist/GST_Billing_Lite -DestinationPath GST_Billing_Windows.zip -Force
          }

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GST_Billing_Windows
          path: GST_Billing_Windows.zip

  # --- MACOS BUILD ---
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 reportlab pyinstaller

      - name: Build with PyInstaller
        run: |
          # --windowed creates a .app bundle for macOS
          pyinstaller --noconsole --windowed --collect-all PyQt6 --name "GST_Billing_Mac" main.py

      - name: Archive Mac Build
        run: |
          cd dist
          zip -r ../GST_Billing_MacOS.zip GST_Billing_Mac.app

      - name: Upload MacOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GST_Billing_Mac
          path: GST_Billing_MacOS.zip
