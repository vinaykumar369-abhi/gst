name: Build Desktop App
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Stable latest
          
      - name: Install Dependencies
        run: npm install
        
      - name: Build React App
        # CI=false ensures warnings don't stop the build
        run: |
          $env:CI="false"
          npm run build
        
      - name: Create Windows Executable
        run: npx nativefier --name "GST-Billing-Pro" --platform "windows" "build/"
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GST-Billing-Windows-EXE
          path: ./*-win32-x64/
