name: Build Desktop App
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Bumping to 24 to clear the deprecation warning in your screenshot
          node-version: 24 
          
      - name: Install Dependencies
        run: npm install
        
      - name: Build React App
        # CI=false prevents the build from failing if there are minor CSS/JS warnings
        run: |
          set CI=false
          npm run build
        
      - name: Create Windows Executable
        # nativefier creates the EXE from your 'build' folder
        run: |
          npx nativefier --name "GST-Billing-Pro" --platform "windows" "build/"
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GST-Billing-Windows-EXE
          path: ./*-win32-x64/
