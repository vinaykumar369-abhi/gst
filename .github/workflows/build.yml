name: Build GST Billing EXEon:push:branches:- main  # Now it triggers every time you push to the main branchtags:- 'v*'  # Also triggers on version tagsworkflow_dispatch: # Allows manual triggerpermissions:contents: write  # Crucial: This allows the action to create the release/exe filejobs:build:runs-on: windows-lateststeps:
- name: Checkout Code
  uses: actions/checkout@v4

- name: Set up Python
  uses: actions/setup-python@v5
  with:
    python-version: '3.10'

- name: Install Dependencies
  run: |
    python -m pip install --upgrade pip
    pip install PyQt6 reportlab pyinstaller

- name: Build with PyInstaller
  run: |
    pyinstaller --noconsole --onefile --name "GST_Billing_Pro" main.py

- name: Upload Artifact
  uses: actions/upload-artifact@v4
  with:
    name: GST_Billing_Windows_Exe
    path: dist/GST_Billing_Pro.exe

- name: Create Release
  if: startsWith(github.ref, 'refs/tags/')
  uses: softprops/action-gh-release@v2
  with:
    files: dist/GST_Billing_Pro.exe
    body: "Automated Build of GST Billing Pro"
  env:
    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
