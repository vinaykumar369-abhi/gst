name: Build GST Billing EXE

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 reportlab pyinstaller

      - name: Build with PyInstaller
        run: |
          # The --collect-all flag ensures all PyQt6 DLLs and dependencies are included
          pyinstaller --noconsole --onefile --collect-all PyQt6 --name "GST_Billing_Pro" main.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GST_Billing_Windows_Exe
          path: dist/GST_Billing_Pro.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/GST_Billing_Pro.exe
          body: "Automated Build of GST Billing Pro"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
