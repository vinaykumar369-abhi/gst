name: Build GST Billing EXE

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Simplified dependencies to ensure a clean environment
          pip install PyQt6 reportlab pyinstaller

      - name: Build with PyInstaller
        run: |
          # Using --collect-all is the most reliable way to bundle PyQt6 DLLs
          # Removed the specific .venv path which was likely causing the 'exit code 1'
          pyinstaller --noconsole --onedir --collect-all PyQt6 --name "GST_Billing_Pro" main.py
        env:
          QT_DEBUG_PLUGINS: 1

      - name: Archive Build Directory
        shell: powershell
        run: |
          if (Test-Path dist/GST_Billing_Pro) {
            cd dist
            Compress-Archive -Path GST_Billing_Pro -DestinationPath ../GST_Billing_Pro_Windows.zip
          } else {
            Write-Error "Build directory not found!"
            exit 1
          }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GST_Billing_Windows_Bundle
          path: GST_Billing_Pro_Windows.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: GST_Billing_Pro_Windows.zip
          body: "Stable Release: Please extract the entire ZIP before running the EXE."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
